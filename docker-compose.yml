services:
  bot:
    build: .
    container_name: wechat-reply-flow
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      WECHAT_PATH: /wechat
      DATABASE_URL: postgresql://${POSTGRES_USER:-wechat}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-wechat_reply_flow}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
      AI_SYSTEM_PROMPT: ${AI_SYSTEM_PROMPT:-你是一个中文微信公众号智能客服，回答要自然、简洁、准确。}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: wechat-reply-flow-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wechat_reply_flow}
      POSTGRES_USER: ${POSTGRES_USER:-wechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
